<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conecta Gerações - WhatsApp</title>
    <link rel="stylesheet" href="../css/passoZero.css">
    <link rel="stylesheet" href="../css/base/global.css">
    <link rel="stylesheet" href="../components/header.css">
    
  </head>
  <body>
    <div id="header"></div>

      <main class="card">
        <div class="card-content">
          <div class="title-container">
            <h1 class="main-title">WhatsApp</h1>
            <div class="title-underline"></div>
          </div>

          <p class="subtitle">
            Aprenda a utilizar o WhatsApp de forma simples e prática
          </p>

          <div class="features-grid">
            <div class="feature-item">
              <div class="icon-placeholder">✓</div>
              <div>
                <strong>Explicações</strong>
                <span>simples</span>
              </div>
            </div>

            <div class="feature-item">
              <div class="icon-placeholder">☺</div>
              <div>
                <strong>Passo a passo</strong>
                <span>ilustrado</span>
              </div>
            </div>

            <div class="feature-item">
              <div class="icon-placeholder">⟳</div>
              <div>
                <strong>Você aprende</strong>
                <span>no seu ritmo</span>
              </div>
            </div>
          </div>

          <button class="cta-button">
            <span class="play-icon">▶</span>Começar o passo a passo
          </button>
        </div>

        <div class="card-image-section">
          <div class="phone-illustration-placeholder">
            <p>
              <strong
                ><img
                  src="../assets/img/whatsapp.png"
                  alt="Sobre qual aplicativo iremos falar"
                  height="600px"
              /></strong>
            </p>
          </div>
        </div>
      </main>
    </div>
    <script src="../js/loadComponents.js"></script>
  </body>
</html>
