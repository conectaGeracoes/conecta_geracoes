<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conecta Gerações - WhatsApp</title>
    <link rel="stylesheet" href="../assets/global.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div class="logo-placeholder">
          <span
            ><img
              src="../assets/img/Meu cantinho de Receitas(2).png"
              alt="Logo Projeto"
              width="100px"
          /></span>
        </div>

        <nav class="nav-menu">
          <a href="#" class="nav-btn active">Início</a>
          <a href="#" class="nav-btn">Passo a passo</a>
          <a href="#" class="nav-btn">Sobre nós</a>
          <a href="#" class="nav-btn">Parcerias</a>
        </nav>
      </header>

      <main class="card">
        <div class="card-content">
          <div class="title-container">
            <h1 class="main-title">WhatsApp</h1>
            <div class="title-underline"></div>
          </div>

          <p class="subtitle">
            Aprenda a utilizar o WhatsApp de forma simples e prática
          </p>

          <div class="features-grid">
            <div class="feature-item">
              <div class="icon-placeholder">✓</div>
              <div>
                <strong>Explicações</strong>
                <span>simples</span>
              </div>
            </div>

            <div class="feature-item">
              <div class="icon-placeholder">☺</div>
              <div>
                <strong>Passo a passo</strong>
                <span>ilustrado</span>
              </div>
            </div>

            <div class="feature-item">
              <div class="icon-placeholder">⟳</div>
              <div>
                <strong>Você aprende</strong>
                <span>no seu ritmo</span>
              </div>
            </div>
          </div>

          <button class="cta-button">
            <span class="play-icon">▶</span>Começar o passo a passo
          </button>
        </div>

        <div class="card-image-section">
          <div class="phone-illustration-placeholder">
            <p>
              <strong
                ><img
                  src="../assets/img/whatsapp.png"
                  alt="Sobre qual aplicativo iremos falar"
                  height="600px"
              /></strong>
            </p>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
